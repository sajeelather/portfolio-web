<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My To-Do List</title>

  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <h1>My To-Dos</h1>
  <p class="subtitle">Stay on top of your day</p>

  <div class="input-row">
    <input type="text" id="task-input" placeholder="Add a new task…" />
    <button id="add-btn" title="Add task">+</button>
  </div>

  <div class="stats">
    <span>Total: <strong id="total">0</strong></span>
    <span>Done: <strong id="done-count">0</strong></span>
    <span>Left: <strong id="remaining">0</strong></span>
  </div>

  <ul id="todo-list">
    <li class="empty"><span></span>No tasks yet. Add one above!</li>
  </ul>
</div>

<script src="script.js"></script>
</body>
</html>
